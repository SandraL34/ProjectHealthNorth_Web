<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../style/style.css">
        <link rel="stylesheet" href="../style/Admin/style_documents.css">

        <title>HealthNorth - Accueil</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="HealthNorth - Leader de la santé depuis 1987">
    </head>

    <body>
        <header id="header"></header>

        <div class="container">
            <h1>Documents</h1>
            <p id="patientNameDisplay"></p>
            <div id="documentsSection"></div>
        </div>

        <footer id="siteFooter">
        </footer>

        <!-- Appel des scripts -->
        
        <script src="../js/Company/header.js"></script>
        <script>
            initHeader("headerAdmin.html", "../style/Admin/style_headerAdmin.css");
        </script>
        
        <script src="../js/Company/footer.js"></script>

        <script src="../js/Company/auth.js"></script>
        <script>
            initPage({
                headerPath: "headerAdmin.html",
                footerPath: "../Company/footer.html",
                allowedRoles: ['ROLE_ADMIN', 'ROLE_DOCTOR']
            });
        </script>

        <script>
            const params = new URLSearchParams(window.location.search);
            const patientId = params.get('patientId');
            const patientName = params.get('patient');

            if (!patientId) {
                alert('Aucun patient sélectionné.');
                window.location.href = 'patient_search.html';
            }

            document.getElementById('documentsSection').dataset.patientId = patientId;
            document.getElementById('patientNameDisplay').textContent = 
                patientName ? `Dossier de ${decodeURIComponent(patientName)}` : '';
        </script>

        <script src="../js/Admin/documents.js"></script>

    </body>
</html>
