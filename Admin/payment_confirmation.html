
<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../style/style.css">
        <link rel="stylesheet" href="../style/Admin/style_center.css">
        <title>HealthNorth - Accueil</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="HealthNorth - Leader de la santé depuis 1987">
    </head>

    <body>
        <header id="header"></header>

        <div class="container">
            <h1>Espace administrateur</h1>
            <div class="module">
                <p id="invoiceInfo"></p>
                <h2>La facture a bien été payée.</h2>
                <div class="boutonContainer">
                    <a href="invoices.html" class="bouton">Retour aux factures</a>
                </div>
            </div>
        </div>

        <footer id="siteFooter">
        </footer>

        <!-- Appel des scripts -->

        <script>
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (id) {
                document.getElementById('invoiceInfo').textContent = `Facture #${id}`;
            }
        </script>
        
        <script src="../js/Company/header.js"></script>
        <script>
            initHeader("headerAdmin.html", "../style/Admin/style_headerAdmin.css");
        </script>
        
        <script src="../js/Company/footer.js"></script>

        <script src="../js/Company/auth.js"></script>
        <script>
            initPage({
                headerPath: "headerAdmin.html",
                footerPath: "../Company/footer.html",
                allowedRoles: ['ROLE_ADMIN', 'ROLE_DOCTOR']
            });
        </script>

    </body>
</html>
