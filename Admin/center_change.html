<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../style/style.css">
        <link rel="stylesheet" href="../style/Admin/style_center.css">
        <title>HealthNorth - Accueil</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="HealthNorth - Leader de la santé depuis 1987">
    </head>

    <body>
        <header id="header"></header>

        <div class="container">
            <h1>Espace administrateur</h1>
            <div class="module">
                <h2>Modifier un centre</h2>
                <div class="grid">
                    <label for="name">Nom du centre</label>
                    <input id="name" type="text" placeholder="Nom du centre">
                    <label for="type">Type de centre</label>
                    <select name="type" id="type"></select>
                    <label for="otherType">Si autre, préciser</label>
                    <input id="otherType" type="text" placeholder="Nom du type à créer">
                    <label for="email">Email</label>
                    <input id="email" type="email" placeholder="email@example.fr">
                    <label for="phoneNumber">Téléphone</label>
                    <input id="phoneNumber" type="text" placeholder="0600000000">
                    <label for="address">Adresse</label>
                    <input id="address" type="text" placeholder="5 rue de la Santé 34000 Montpellier">
                    <label for="latitude">Latitude</label>
                    <input id="latitude" type="text" placeholder="43.611904995780854">
                    <label for="longitude">Longitude</label>
                    <input id="longitude" type="text" placeholder="3.870104618422019">
                </div>

                <div class="boutonContainer">
                    <a href="center_change_confirmation.html" class="bouton" id="modifyCenter">Modifier</a>
                </div>
            </div>
        </div>

        <footer id="siteFooter">
        </footer>

        <!-- Appel des scripts -->
        
        <script src="../js/Company/header.js"></script>
        <script>
            initHeader("headerAdmin.html", "../style/Admin/style_headerAdmin.css");
        </script>
        
        <script src="../js/Company/footer.js"></script>

        <script src="../js/Company/auth.js"></script>
        <script>
            initPage({
                headerPath: "headerAdmin.html",
                footerPath: "../Company/footer.html",
                allowedRoles: ['ROLE_ADMIN', 'ROLE_DOCTOR']
            });
        </script>

        <script src="../js/Admin/center.js"></script>
        <script>
            getCenterInfo();
        </script>

        <script src="../js/Admin/center_change.js"></script>

    </body>
</html>
